services:
  - type: web
    name: archisolve
    runtime: python
    region: oregon
    plan: free
    buildCommand: apt-get install -y tesseract-ocr poppler-utils libgl1 libglib2.0-0 && pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: TESSERACT_CMD
        value: tesseract
      - key: UPLOAD_DIR
        value: uploads
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
